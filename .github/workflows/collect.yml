name: Collecte automatique YT Trend Pulse

# Se déclenche automatiquement toutes les 6 heures (00:00, 06:00, 12:00, 18:00 UTC),
# même si personne n'est connecté au site. "workflow_dispatch" permet aussi de
# lancer une collecte manuellement depuis l'onglet "Actions" de GitHub (utile
# pour tester tout de suite au lieu d'attendre le prochain créneau).
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm'

      - name: Installer les dépendances
        run: npm install

      - name: Lancer la collecte YouTube -> Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          YOUTUBE_API_KEY_SERVER: ${{ secrets.YOUTUBE_API_KEY_SERVER }}
        run: node collect.js
