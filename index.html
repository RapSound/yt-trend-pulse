<style>
  :root {
    --bg: #0B0B0C;
    --panel: #141415;
    --card: #1B1B1D;
    --card-hi: #232325;
    --red: #FF0000;
    --red-dim: #7A0000;
    --green: #1DD75B;
    --amber: #FFB020;
    --blue: #3B82F6;
    --txt: #F2F2F2;
    --txt-dim: #93939A;
    --line: #2A2A2D;
  }
  * { box-sizing: border-box; }
  body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; }
  .font-display { font-family: 'Archivo Black', sans-serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--red-dim); }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
  }
  .card:hover { border-color: #3a3a3d; }
  .card-clickable {
    cursor: pointer;
    transition: transform .12s ease, border-color .12s ease;
  }
  .card-clickable:hover { transform: translateY(-2px); border-color: #4a4a4d; }
  .card-clickable:active { transform: translateY(0); }

  .pulse-dot { position: relative; }
  .pulse-dot::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 999px;
    border: 2px solid var(--red);
    animation: pulse 1.8s ease-out infinite;
  }
  .pulse-dot.green::after { border-color: var(--green); }
  @keyframes pulse {
    0% { transform: scale(.6); opacity: 1; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  .score-ring { transform: rotate(-90deg); }
  .score-ring circle { transition: stroke-dashoffset 0.6s ease; }

  .tab-btn {
    transition: all .15s ease;
  }
  .tab-btn.active {
    background: var(--red);
    color: #fff;
    box-shadow: 0 0 0 1px rgba(255,0,0,.4), 0 8px 24px -8px rgba(255,0,0,.6);
  }
  .tab-btn:not(.active):hover { background: var(--card-hi); }

  .notif-card { border-left: 3px solid var(--line); }
  .notif-card.alert-breakout { border-left-color: var(--green); background: linear-gradient(90deg, rgba(29,215,91,0.08), transparent); }
  .notif-card.alert-late { border-left-color: var(--red); background: linear-gradient(90deg, rgba(255,0,0,0.1), transparent); }
  .notif-card.alert-stagnation { border-left-color: var(--amber); background: linear-gradient(90deg, rgba(255,176,32,0.08), transparent); }
  .notif-card.alert-choice { border-left-color: var(--blue); background: linear-gradient(90deg, rgba(59,130,246,0.08), transparent); }

  .skeleton { background: linear-gradient(90deg,#1a1a1a 25%,#262626 37%,#1a1a1a 63%); background-size:400% 100%; animation:shimmer 1.4s ease infinite; }
  @keyframes shimmer { 0%{background-position:100% 0}100%{background-position:0 0} }

  .badge { font-size: 10px; letter-spacing: .06em; padding: 2px 8px; border-radius: 999px; font-weight: 700; white-space: nowrap; }
  input[type=text], input[type=email], input[type=password] { background: #0F0F10; border: 1px solid var(--line); color: var(--txt); }
  input[type=text]:focus, input[type=email]:focus, input[type=password]:focus { outline: none; border-color: var(--red); }

  .scrollbar-thin { scrollbar-width: thin; }
  .glow-red { box-shadow: 0 0 40px -10px rgba(255,0,0,.35); }
  .frozen-shine { background: linear-gradient(135deg, rgba(255,0,0,0.06) 0%, transparent 40%); }
  .comment-item { border-bottom: 1px solid var(--line); padding: 10px 0; }
  .comment-item:last-child { border-bottom: none; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:translateY(0)} }
  .fade-in { animation: fadeIn .25s ease; }

  .podium { display: flex; align-items: flex-end; gap: 12px; padding: 20px 0; }
  .podium-item { flex: 1; text-align: center; padding: 12px 8px; border-radius: 8px; background: var(--card); border: 1px solid var(--line); transition: all .2s; }
  .podium-item:hover { transform: scale(1.02); border-color: var(--red); }
  .podium-item .rank { font-size: 24px; font-weight: 800; font-family: 'Archivo Black', sans-serif; }

  .podium-item .artist { font-size: 11px; color: var(--txt-dim); }

  messagingSenderId: "219266465197",

};
const YOUTUBE_API_KEY_CLIENT = "AIzaSyAs3o6uUU9QxkerS5HcSUzyrwSlcTKf-mI";
const COLORS = { red: "#FF0000", green: "#1DD75B", amber: "#FFB020", blue: "#3B82F6" };

// ========================================================================
// FIREBASE INIT
// ========================================================================
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

// ========================================================================
// STATE
// ========================================================================
const state = {
  user: null,
  authError: null,
  authLoading: false,
  trackedVideos: {},
  artists: [], // Liste dynamique des artistes suivis
  activeTab: "podium",
  selectedVideoId: null,
  notifications: [],
  loading: false,
  loadingMsg: "",
  lastSync: null,
  notifPanelOpen: false,
  searchError: null,
  pendingChoices: [],
  charts: [],
  chartsLastSync: null,
  quickFilter: "",
};
let analyseChartInstance = null;
let unsubscribeVideos = null;
let unsubscribeArtists = null;

// ========================================================================
// YOUTUBE API (client)
// ========================================================================
const YT_BASE = "https://www.googleapis.com/youtube/v3";

async function ytFetch(endpoint, params) {
  const url = new URL(YT_BASE + "/" + endpoint);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  url.searchParams.set("key", YOUTUBE_API_KEY_CLIENT);
  const res = await fetch(url.toString());
  const data = await res.json();
  if (!res.ok) {
    const reason = data?.error?.errors?.[0]?.reason || data?.error?.message || "erreur inconnue";
    throw new Error(reason);
  }
  return data;
}

function parseISODuration(iso) {
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return (parseInt(m[1]||0) * 3600) + (parseInt(m[2]||0) * 60) + parseInt(m[3]||0);
}

async function getUploadsPlaylistId(channelId) {
  const data = await ytFetch("channels", { part: "contentDetails", id: channelId });
  if (!data.items?.length) throw new Error("Chaîne invalide");
  return data.items[0].contentDetails.relatedPlaylists.uploads;
}

async function getRecentUploadIds(playlistId, max = 20) {
  const data = await ytFetch("playlistItems", { part: "contentDetails", playlistId, maxResults: String(max) });
  return (data.items||[]).map(it => it.contentDetails.videoId);
}

async function getVideosDetails(ids) {
  if (!ids.length) return [];
  const out = [];
  for (let i = 0; i < ids.length; i += 50) {
    const chunk = ids.slice(i, i+50);
    const data = await ytFetch("videos", { part: "snippet,statistics,contentDetails", id: chunk.join(",") });
    out.push(...(data.items||[]));
  }
  return out;
}

async function getChannelInfo(channelId) {
  const data = await ytFetch("channels", { part: "snippet,statistics", id: channelId });
  if (!data.items?.length) return null;
  return {
    title: data.items[0].snippet.title,
    thumbnail: data.items[0].snippet.thumbnails?.default?.url,
    subscribers: parseInt(data.items[0].statistics.subscriberCount || 0),
  };
}

async function resolveChannelId(artistName) {
  const data = await ytFetch("search", { part: "snippet", q: artistName, type: "channel", maxResults: "6" });
  if (!data.items || data.items.length === 0) {
    return { ambiguous: true, candidates: [], reason: "Aucune chaîne trouvée" };
  }
  const ids = data.items.map(it => it.snippet.channelId);
  let statsById = {};
  try {
    const statsData = await ytFetch("channels", { part: "statistics,snippet", id: ids.join(",") });
    (statsData.items||[]).forEach(c => statsById[c.id] = c);
  } catch(e) {}
  const candidates = data.items.map(it => {
    const c = statsById[it.snippet.channelId];
    return {
      channelId: it.snippet.channelId,
      title: it.snippet.title,
      thumbnail: it.snippet.thumbnails?.default?.url,
      subs: c ? parseInt(c.statistics.subscriberCount||0) : null
    };
  });
  return { ambiguous: true, candidates, reason: "Plusieurs chaînes possibles" };
}

// ========================================================================
// FIRESTORE OPERATIONS
// ========================================================================
async function fsGetArtists() {
  const doc = await db.collection('meta').doc('artists').get();
  if (doc.exists) {
    const data = doc.data();
    return data.list || [];
  }
  return [];
}

async function fsAddArtist(artistName, channelId) {
  const ref = db.collection('meta').doc('artists');
  await ref.update({
    list: firebase.firestore.FieldValue.arrayUnion({
      name: artistName,
      channelId: channelId,
      addedAt: new Date().toISOString()
    })
  });
}

async function fsRemoveArtist(artistName) {
  const ref = db.collection('meta').doc('artists');
  const doc = await ref.get();
  if (doc.exists) {
    const list = doc.data().list || [];
    const newList = list.filter(a => a.name !== artistName);
    await ref.set({ list: newList });
  }
}

async function fsUpsertVideo(video, artist) {
  const ref = db.collection('videos').doc(video.id);
  const nowIso = new Date().toISOString();
  const dateKey = nowIso.slice(0,10);
  const potential = computeEngagementScore(video.likes, video.views);
  const snap = {
    t: nowIso,
    views: video.views,
    likes: video.likes,
    commentCount: video.commentCount || 0,
    potential
  };

  const doc = await ref.get();
  const prevRecent = doc.exists ? (doc.data().snapshotsRecent || []) : [];
  const recent = [...prevRecent.filter(s => s.t.slice(0,10) !== dateKey), snap]
    .sort((a,b) => a.t.localeCompare(b.t))
    .slice(-10);

  await ref.set({
    title: video.title,
    artist: artist,
    channelId: video.channelId,
    channelTitle: video.channelTitle,
    thumbnail: video.thumbnail,
    publishedAt: video.publishedAt,
    duration: video.duration || 0,
    views: video.views,
    likes: video.likes,
    commentCount: video.commentCount || 0,
    snapshotsRecent: recent,
    lastUpdated: nowIso,
    frozen: doc.exists ? (doc.data().frozen || false) : false,
    frozenAt: doc.exists ? (doc.data().frozenAt || null) : null,
  }, { merge: true });

  // Ajouter le point d'historique
  await ref.collection('snapshots').doc(dateKey).set(snap, { merge: true });
}

async function fsFetchFullSnapshots(videoId) {
  const qs = await db.collection('videos').doc(videoId).collection('snapshots').orderBy('t', 'asc').get();
  return qs.docs.map(d => d.data());
}

async function fsSetFrozen(videoId, frozen, date) {
  await db.collection('videos').doc(videoId).set({ frozen, frozenAt: date }, { merge: true });
}

// ========================================================================
// SCORING & CLASSIFICATION (nouvelle logique)
// ========================================================================
function computeEngagementScore(likes, views) {
  if (!views) return 0;
  const ratio = (likes / views) * 100;
  return Math.max(0, Math.min(100, (ratio / 10) * 100));
}

function computeVelocityScore(snapshots) {
  if (!snapshots || snapshots.length < 2) return { score: null, viewsPerHour: 0 };
  const last = snapshots[snapshots.length-1];
  const prev = snapshots[snapshots.length-2];
  const dt = Math.max((new Date(last.t) - new Date(prev.t)) / 3600000, 0.1);
  const viewsPerHour = (last.views - prev.views) / dt;
  return {
    score: Math.max(0, Math.min(100, (viewsPerHour / 5000) * 100)),
    viewsPerHour
  };
}

function computeFinalScore(video) {
  const engagement = computeEngagementScore(video.likes, video.views);
  const velocity = computeVelocityScore(video.snapshotsRecent || []);
  const ageBonus = Math.max(0, Math.min(20, (30 - daysSince(video.publishedAt)) / 30 * 20));
  const freezeBonus = video.frozen ? 10 : 0;
  const total = engagement * 0.4 + (velocity.score ?? 50) * 0.3 + ageBonus * 0.3 + freezeBonus;
  return {
    total: Math.round(Math.min(100, total)),
    breakdown: {
      engagement: Math.round(engagement),
      velocity: velocity.score == null ? null : Math.round(velocity.score),
      ageBonus: Math.round(ageBonus),
      freezeBonus
    }
  };
}

function classify(video) {
  const age = daysSince(video.publishedAt);
  // Petite tendance: J0 à J10 avec faible engagement
  if (age >= 0 && age <= 10) {
    const engagement = computeEngagementScore(video.likes, video.views);
    if (engagement < 30) return "petite";
  }
  // Grande tendance: J10 à J30 avec engagement correct ou exceptionnel
  if (age > 10 && age <= 30) {
    const engagement = computeEngagementScore(video.likes, video.views);
    if (engagement >= 30) return "grande";
  }
  return "hors-fenetre";
}

function daysSince(dateStr) {
  return (Date.now() - new Date(dateStr).getTime()) / 86400000;
}

function detectBreakout(snapshots) {
  if (!snapshots || snapshots.length < 3) return false;
  const v = snapshots.slice(-3).map(x => x.views);
  return v[1] - v[0] > 0 && (v[2] - v[1]) > (v[1] - v[0]) * 1.8;
}

function detectSlowdown(snapshots) {
  if (!snapshots || snapshots.length < 3) return false;
  const v = snapshots.slice(-3).map(x => x.views);
  return v[1] - v[0] > 0 && (v[2] - v[1]) < (v[1] - v[0]) * 0.4;
}

function detectStagnation(snapshots) {
  if (!snapshots || snapshots.length < 7) return false;
  const r = snapshots.slice(-7);
  const spread = Math.max(...r.map(x => x.views)) - Math.min(...r.map(x => x.views));
  const avg = r.reduce((a, x) => a + x.views, 0) / r.length;
  return (spread / avg) < 0.02;
}

function deriveVideo(v) {
  const snaps = v.snapshotsRecent || [];
  const category = classify(v);
  const scoreData = computeFinalScore(v);
  return {
    ...v,
    category,
    score: scoreData.total,
    breakdown: scoreData.breakdown,
    breakout: detectBreakout(snaps),
    slowdown: detectSlowdown(snaps),
    stagnation: category === "grande" && detectStagnation(snaps),
    comments: v.comments || null,
    fullSnapshots: v.fullSnapshots || null
  };
}

// ========================================================================
// FIRESTORE LISTENERS
// ========================================================================
function fsListenArtists() {
  if (unsubscribeArtists) unsubscribeArtists();
  unsubscribeArtists = db.collection('meta').doc('artists').onSnapshot(doc => {
    if (doc.exists) {
      const data = doc.data();
      state.artists = data.list || [];
    } else {
      state.artists = [];
    }
    render();
  }, err => {
    console.error("Erreur écoute artistes:", err);
  });
}

function fsListenVideos() {
  if (unsubscribeVideos) unsubscribeVideos();
  unsubscribeVideos = db.collection('videos').onSnapshot(qs => {
    qs.docChanges().forEach(change => {
      const id = change.doc.id;
      if (change.type === 'removed') {
        delete state.trackedVideos[id];
        return;
      }
      const data = change.doc.data();
      const existing = state.trackedVideos[id] || {};
      state.trackedVideos[id] = deriveVideo({ ...existing, ...data, id });
    });
    evaluateNotifications();
    state.lastSync = new Date();
    render();
  }, err => {
    state.notifications.push({ type: "error", msg: "Erreur Firestore: " + err.message });
    render();
  });
}

// ========================================================================
// SYNC MANUELLE
// ========================================================================
async function syncAll() {
  if (state.artists.length === 0) {
    state.notifications.push({ type: "error", msg: "Aucun artiste suivi. Ajoute des chaînes d'abord !" });
    render();
    return;
  }

  state.loading = true;
  state.notifications = state.notifications.filter(n => n.type !== 'error' && n.type !== 'choice');
  render();

  let totalVideos = 0;
  for (const artist of state.artists) {
    state.loadingMsg = `Collecte pour ${artist.name}...`;
    render();
    try {
      const playlistId = await getUploadsPlaylistId(artist.channelId);
      const ids = await getRecentUploadIds(playlistId, 20);
      const details = await getVideosDetails(ids);
      for (const v of details) {
        const video = {
          id: v.id,
          title: v.snippet.title,
          channelId: artist.channelId,
          channelTitle: v.snippet.channelTitle,
          thumbnail: v.snippet.thumbnails?.medium?.url || v.snippet.thumbnails?.default?.url,
          publishedAt: v.snippet.publishedAt,
          views: parseInt(v.statistics.viewCount || 0),
          likes: parseInt(v.statistics.likeCount || 0),
          commentCount: parseInt(v.statistics.commentCount || 0),
          duration: parseISODuration(v.contentDetails.duration)
        };
        await fsUpsertVideo(video, artist.name);
        totalVideos++;
      }
    } catch(e) {
      state.notifications.push({ type: "error", msg: `Erreur pour ${artist.name}: ${e.message}` });
    }
  }

  // Mettre à jour les vidéos figées
  try {
    const frozenSnap = await db.collection('videos').where('frozen', '==', true).get();
    if (!frozenSnap.empty) {
      const frozenIds = frozenSnap.docs.map(d => d.id);
      const frozenData = {};
      frozenSnap.docs.forEach(d => frozenData[d.id] = d.data());
      const details = await getVideosDetails(frozenIds);
      for (const v of details) {
        const existing = frozenData[v.id];
        if (!existing) continue;
        const video = {
          id: v.id,
          title: v.snippet.title,
          channelId: existing.channelId,
          channelTitle: v.snippet.channelTitle,
          thumbnail: v.snippet.thumbnails?.medium?.url || v.snippet.thumbnails?.default?.url,
          publishedAt: v.snippet.publishedAt,
          views: parseInt(v.statistics.viewCount || 0),
          likes: parseInt(v.statistics.likeCount || 0),
          commentCount: parseInt(v.statistics.commentCount || 0),
          duration: parseISODuration(v.contentDetails.duration)
        };
        await fsUpsertVideo(video, existing.artist);
        totalVideos++;
      }
    }
  } catch(e) {
    state.notifications.push({ type: "error", msg: "Erreur mise à jour figés: " + e.message });
  }

  state.loading = false;
  state.loadingMsg = "";
  state.notifications.push({ type: "info", msg: `${totalVideos} vidéo(s) mises à jour.` });
  render();
}

// ========================================================================
// GESTION DES ARTISTES (AJOUT/SUPPRESSION)
// ========================================================================
async function addArtist() {
  const nameInput = document.getElementById('artist-name');
  const channelInput = document.getElementById('artist-channel');
  const name = nameInput?.value.trim();
  const channelId = channelInput?.value.trim();

  if (!name || !channelId) {
    state.notifications.push({ type: "error", msg: "Remplis le nom et l'ID de chaîne." });
    render();
    return;
  }

  // Vérifier que l'artiste n'existe pas déjà
  if (state.artists.some(a => a.name.toLowerCase() === name.toLowerCase())) {
    state.notifications.push({ type: "error", msg: `"${name}" est déjà suivi.` });
    render();
    return;
  }

  // Vérifier que la chaîne existe
  try {
    const info = await getChannelInfo(channelId);
    if (!info) {
      state.notifications.push({ type: "error", msg: "ID de chaîne invalide." });
      render();
      return;
    }
    await fsAddArtist(name, channelId);
    if (nameInput) nameInput.value = '';
    if (channelInput) channelInput.value = '';
    state.notifications.push({ type: "info", msg: `"${name}" ajouté avec succès !` });
    // Lancer une collecte immédiate pour le nouvel artiste
    setTimeout(() => syncAll(), 500);
  } catch(e) {
    state.notifications.push({ type: "error", msg: "Erreur: " + e.message });
    render();
  }
}

async function removeArtist(name) {
  if (confirm(`Supprimer "${name}" de la liste de suivi ?`)) {
    await fsRemoveArtist(name);
    state.notifications.push({ type: "info", msg: `"${name}" supprimé.` });
  }
}

// ========================================================================
// ANALYSE / COMMENTS
// ========================================================================
async function getVideoComments(videoId, max = 12) {
  try {
    const data = await ytFetch("commentThreads", {
      part: "snippet",
      videoId,
      maxResults: String(max),
      order: "relevance",
      textFormat: "plainText"
    });
    return {
      items: (data.items||[]).map(it => {
        const c = it.snippet.topLevelComment.snippet;
        return {
          author: c.authorDisplayName,
          text: c.textDisplay,
          likeCount: c.likeCount,
          publishedAt: c.publishedAt,
          authorImg: c.authorProfileImageUrl
        };
      })
    };
  } catch(e) {
    const disabled = /commentsDisabled/i.test(e.message);
    return { error: disabled ? "Commentaires désactivés." : "Erreur: " + e.message };
  }
}

async function openAnalyse(videoId) {
  state.selectedVideoId = videoId;
  state.activeTab = "analyse";
  render();
  const v = state.trackedVideos[videoId];
  if (v && v.comments == null) {
    const res = await getVideoComments(videoId);
    if (state.trackedVideos[videoId]) {
      state.trackedVideos[videoId].comments = res;
      render();
    }
  }
  if (v && v.fullSnapshots == null) {
    const full = await fsFetchFullSnapshots(videoId);
    if (state.trackedVideos[videoId]) {
      state.trackedVideos[videoId].fullSnapshots = full;
      render();
    }
  }
}

async function toggleFreeze(videoId) {
  const v = state.trackedVideos[videoId];
  if (!v) return;
  if (v.frozen) {
    await fsSetFrozen(videoId, false, null);
  } else {
    const date = new Date().toISOString();
    await fsSetFrozen(videoId, true, date);
  }
}

async function getTrendingMusicFR() {
  const data = await ytFetch("videos", {
    part: "snippet,statistics,contentDetails",
    chart: "mostPopular",
    regionCode: "FR",
    videoCategoryId: "10",
    maxResults: "25"
  });
  return (data.items||[]).map((v, idx) => ({
    id: v.id,
    rank: idx + 1,
    title: v.snippet.title,
    channelTitle: v.snippet.channelTitle,
    channelId: v.snippet.channelId,
    thumbnail: v.snippet.thumbnails?.medium?.url,
    publishedAt: v.snippet.publishedAt,
    views: parseInt(v.statistics.viewCount||0),
    likes: parseInt(v.statistics.likeCount||0),
    commentCount: parseInt(v.statistics.commentCount||0),
    duration: parseISODuration(v.contentDetails.duration)
  }));
}

async function syncCharts() {
  state.loading = true;
  state.loadingMsg = "Chargement des charts YouTube FR...";
  render();
  try {
    state.charts = await getTrendingMusicFR();
    state.chartsLastSync = new Date();
  } catch(e) {
    state.notifications.push({ type: "error", msg: "Erreur Charts: " + e.message });
  }
  state.loading = false;
  state.loadingMsg = "";
  render();
}

// ========================================================================
// HELPERS
// ========================================================================
function fmtNum(n) {
  if (n == null) return "—";
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, "") + "k";
  return String(n);
}

function fmtAge(publishedAt) {
  const d = daysSince(publishedAt);
  if (d < 1) return Math.round(d * 24) + "h";
  if (d < 30) return Math.round(d) + "j";
  return Math.round(d / 30) + "mois";
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
}

function scoreColor(score) {
  if (score >= 70) return COLORS.green;
  if (score >= 40) return COLORS.amber;
  return COLORS.red;
}

function scoreRing(score, size = 56) {
  const r = (size - 8) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (score / 100) * c;
  return `<svg width="${size}" height="${size}" class="score-ring">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="#2A2A2A" stroke-width="5" fill="none"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${scoreColor(score)}" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
  </svg>`;
}

function sparkline(snapshots, key = 'views', w = 100, h = 28) {
  if (!snapshots || snapshots.length < 2) {
    return `<div class="text-[10px] text-[var(--txt-dim)]" style="height:${h}px">en mesure...</div>`;
  }
  const vals = snapshots.slice(-10).map(s => s[key] || 0);
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const range = (max - min) || 1;
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * w;
    const y = h - ((v - min) / range) * h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  const color = vals[vals.length-1] >= vals[0] ? COLORS.green : COLORS.red;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function getPodium() {
  const videos = Object.values(state.trackedVideos)
    .filter(v => v.category === "grande" || v.category === "petite")
    .sort((a, b) => b.score - a.score);
  return videos.slice(0, 10);
}

// ========================================================================
// NOTIFICATIONS
// ========================================================================
function evaluateNotifications() {
  const fresh = [];
  Object.values(state.trackedVideos).forEach(v => {
    if (v.frozen) return;
    if (v.breakout) {
      fresh.push({ type: "breakout", video: v, msg: `🔥 ${v.title} - ${v.artist} en montée fracassante !` });
    }
    if (v.slowdown) {
      fresh.push({ type: "late", video: v, msg: `⚠️ ${v.title} - ${v.artist} ralentit, risque de saturation.` });
    }
    if (v.stagnation) {
      fresh.push({ type: "stagnation", video: v, msg: `📊 ${v.title} - ${v.artist} stagne depuis 7 jours.` });
    }
  });
  const others = state.notifications.filter(n => n.type === "choice" || n.type === "error" || n.type === "info");
  state.notifications = [...others, ...fresh];
}

function notifIcon(type) {
  const icons = {
    breakout: '<i class="fa-solid fa-bolt text-green-400"></i>',
    late: '<i class="fa-solid fa-triangle-exclamation text-red-400"></i>',
    stagnation: '<i class="fa-solid fa-pause text-amber-400"></i>',
    choice: '<i class="fa-solid fa-circle-question text-blue-400"></i>',
    error: '<i class="fa-solid fa-circle-exclamation text-gray-400"></i>',
    info: '<i class="fa-solid fa-circle-info text-blue-400"></i>'
  };
  return icons[type] || '<i class="fa-solid fa-bell text-gray-400"></i>';
}

function notifClass(type) {
  const classes = {
    breakout: "alert-breakout",
    late: "alert-late",
    stagnation: "alert-stagnation",
    choice: "alert-choice"
  };
  return classes[type] || "";
}

        <div class="mt-2 flex items-center gap-2 flex-wrap">
          <span class="badge ${v.category === 'grande' ? 'bg-red-900/40 text-red-300 border border-red-800' : v.category === 'petite' ? 'bg-blue-900/40 text-blue-300 border border-blue-800' : 'bg-gray-800 text-gray-400 border border-gray-700'}">${v.category}</span>
          ${v.frozen ? `<span class="badge bg-red-600 text-white"><i class="fa-solid fa-lock mr-1"></i>FIGÉ</span>` : ""}
        </div>
      </div>
      <div class="flex flex-col items-center shrink-0 relative">${scoreRing(v.score, 64)}<span class="absolute font-display text-base" style="color:${scoreColor(v.score)}">${v.score}</span></div>
    </div>
    <div class="grid grid-cols-5 gap-2 text-center font-mono text-xs mt-5 border-t border-[#2a2a2a] pt-4">
      <div><p class="text-[var(--txt-dim)]">Vues</p><p class="font-semibold text-sm">${fmtNum(v.views)}</p></div>
      <div><p class="text-[var(--txt-dim)]">Likes</p><p class="font-semibold text-sm">${fmtNum(v.likes)}</p></div>
      <div><p class="text-[var(--txt-dim)]">Commentaires</p><p class="font-semibold text-sm">${fmtNum(v.commentCount)}</p></div>
      <div><p class="text-[var(--txt-dim)]">Âge</p><p class="font-semibold text-sm">${fmtAge(v.publishedAt)}</p></div>
      <div><p class="text-[var(--txt-dim)]">Éngagement</p><p class="font-semibold text-sm">${v.breakdown.engagement}%</p></div>
    </div>
    <div class="flex justify-end mt-4">
      <button onclick="toggleFreeze('${v.id}')" class="px-4 py-2 rounded-lg text-xs font-semibold transition ${v.frozen ? 'bg-red-900/50 text-red-300 cursor-default' : 'bg-[#262626] text-[var(--txt-dim)] hover:text-white hover:bg-red-600'}">
        <i class="fa-solid ${v.frozen ? 'fa-lock' : 'fa-lock-open'} mr-1"></i>${v.frozen ? 'Figé' : 'Figer (+10 pts)'}
      </button>
    </div>
  </div>

  <div class="card p-4 mb-4">
    <p class="text-xs text-[var(--txt-dim)] mb-1">Courbe Vues / Likes / Commentaires</p>
    <canvas id="analyse-chart" height="110"></canvas>
  </div>

  <div class="card p-4">
    <p class="text-xs text-[var(--txt-dim)] mb-2"><i class="fa-solid fa-comments mr-1"></i>Commentaires (via API)</p>
    ${renderComments(v)}
  </div>`;
}

function renderComments(v) {
  if (v.comments == null) return `<div class="skeleton h-16 rounded-lg"></div>`;
  if (v.comments.error) return `<p class="text-xs text-[var(--txt-dim])">${v.comments.error}</p>`;
  if (!v.comments.items.length) return `<p class="text-xs text-[var(--txt-dim])">Aucun commentaire.</p>`;
  return v.comments.items.slice(0, 8).map(c => `
    <div class="comment-item">
      <div class="flex items-start gap-2">
        <img src="${c.authorImg}" class="w-7 h-7 rounded-full shrink-0" />
        <div class="flex-1 min-w-0">
          <p class="text-xs font-semibold">${c.author} <span class="text-[10px] text-[var(--txt-dim)] font-normal">· ${fmtDate(c.publishedAt)}</span></p>
          <p class="text-xs text-[var(--txt-dim)] mt-0.5">${(c.text||"").slice(0,280)}${(c.text||"").length > 280 ? '…' : ''}</p>
          <p class="text-[10px] text-[var(--txt-dim)] mt-1"><i class="fa-solid fa-thumbs-up mr-1"></i>${fmtNum(c.likeCount)}</p>
        </div>
      </div>
    </div>
  `).join("");
}

function renderAnalyseChart() {
  const v = state.selectedVideoId ? state.trackedVideos[state.selectedVideoId] : null;
  const ctx = document.getElementById("analyse-chart");
  if (!v || !ctx || !v.fullSnapshots || !v.fullSnapshots.length) return;
  if (analyseChartInstance) { analyseChartInstance.destroy(); analyseChartInstance = null; }
  const pubTime = new Date(v.publishedAt).getTime();
  const labels = v.fullSnapshots.map(s => "J" + Math.max(1, Math.round((new Date(s.t).getTime() - pubTime) / 86400000) + 1));
  analyseChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Vues', data: v.fullSnapshots.map(s => s.views), borderColor: COLORS.red, backgroundColor: 'rgba(255,0,0,0.08)', tension: 0.3, fill: true, yAxisID: 'y' },
        { label: 'Likes', data: v.fullSnapshots.map(s => s.likes), borderColor: COLORS.blue, backgroundColor: 'rgba(59,130,246,0.08)', tension: 0.3, fill: true, yAxisID: 'y1' },
        { label: 'Commentaires', data: v.fullSnapshots.map(s => s.commentCount || 0), borderColor: COLORS.amber, backgroundColor: 'rgba(255,176,32,0.08)', tension: 0.3, fill: true, yAxisID: 'y1' },
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      scales: {
        y: { position: 'left', ticks: { color: '#9A9A9A' }, grid: { color: '#222' } },
        y1: { position: 'right', ticks: { color: '#9A9A9A' }, grid: { display: false } },
        x: { ticks: { color: '#9A9A9A' }, grid: { display: false } }
      },
      plugins: { legend: { labels: { color: '#F2F2F2' } } }
    }
  });
}

function renderCharts() {
  return `
  <div class="max-w-4xl">
    <div class="flex items-center justify-between mb-4">
      <p class="text-xs text-[var(--txt-dim)] font-mono">${state.chartsLastSync ? 'Dernière sync : ' + state.chartsLastSync.toLocaleTimeString('fr-FR') : "Pas encore synchronisé"}</p>
      <button onclick="syncCharts()" class="px-3 py-1.5 rounded-lg bg-[#1a1a1a] hover:bg-[#242424] text-xs font-semibold transition" ${state.loading?'disabled':''}>
        <i class="fa-solid fa-rotate ${state.loading?'animate-spin':''} mr-1"></i>Charger les tendances FR
      </button>
    </div>
    ${!state.charts.length ? `<div class="flex flex-col items-center justify-center py-16 text-[var(--txt-dim)]"><i class="fa-solid fa-ranking-star text-3xl mb-3 opacity-40"></i><p class="text-sm">Clique sur "Charger les tendances FR".</p></div>` : `
      <div class="flex flex-col gap-2">
        ${state.charts.map(c => `
          <div class="card card-clickable p-3 flex items-center gap-3" onclick="openAnalyse('${c.id}')">
            <span class="font-display text-lg w-8 text-center text-[var(--txt-dim)]">#${c.rank}</span>
            <img src="${c.thumbnail}" class="w-16 h-11 object-cover rounded-md border border-[#2a2a2a]" />
            <div class="flex-1 min-w-0"><p class="text-sm font-semibold truncate">${c.title}</p><p class="text-xs text-[var(--txt-dim)] font-mono">${c.channelTitle} · ${fmtAge(c.publishedAt)}</p></div>
            <div class="text-right font-mono text-xs"><p class="font-semibold">${fmtNum(c.views)} vues</p><p class="text-[var(--txt-dim])">${fmtNum(c.likes)} likes</p></div>
          </div>
        `).join("")}
      </div>
    `}
  </div>`;
}

// ========================================================================
// AUTHENTIFICATION
// ========================================================================
function renderLoginScreen() {
  return `<div class="min-h-screen flex items-center justify-center px-6">
    <div class="max-w-md w-full">
      <div class="flex items-center gap-2 mb-6 justify-center"><div class="w-10 h-10 rounded-lg bg-red-600 flex items-center justify-center"><i class="fa-brands fa-youtube text-white"></i></div><p class="font-display text-lg">YT TREND PULSE</p></div>
      <div class="card p-6 glow-red">
        <p class="text-sm font-semibold mb-1">Connexion</p>
        <p class="text-xs text-[var(--txt-dim)] mb-4">Accès réservé</p>
        <input id="login-email" type="email" placeholder="email@exemple.com" class="w-full px-3 py-2.5 rounded-lg text-sm mb-2" />
        <input id="login-password" type="password" placeholder="Mot de passe" class="w-full px-3 py-2.5 rounded-lg text-sm mb-3" />
        <button id="login-submit" class="w-full py-2.5 rounded-lg bg-red-600 hover:bg-red-500 text-white text-sm font-semibold transition">Se connecter</button>
        <p id="login-error" class="text-xs text-red-400 mt-2 hidden"></p>
      </div>
    </div>
  </div>`;
}

function bindLoginScreen() {
  const submit = document.getElementById("login-submit");
  const doLogin = async () => {
    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    const errEl = document.getElementById("login-error");
    errEl.classList.add("hidden");
    try {
      await auth.signInWithEmailAndPassword(email, password);
    } catch(e) {
      errEl.textContent = "Connexion refusée : " + e.message;
      errEl.classList.remove("hidden");
    }
  };
  submit.onclick = doLogin;
  document.getElementById("login-password").addEventListener("keydown", e => { if(e.key === 'Enter') doLogin(); });
}

async function doSignOut() {
  if (unsubscribeVideos) unsubscribeVideos();
  if (unsubscribeArtists) unsubscribeArtists();
  state.trackedVideos = {};
  state.selectedVideoId = null;
  await auth.signOut();
}

// ========================================================================
// UI ACTIONS
// ========================================================================
function setTab(id) {
  state.activeTab = id;
  render();
}

function toggleNotifPanel() {
  state.notifPanelOpen = !state.notifPanelOpen;
  render();
}

async function runManualSearch() {
  const title = document.getElementById("search-title")?.value.trim();
  const artist = document.getElementById("search-artist")?.value.trim();
  state.searchError = null;
  if (!title && !artist) {
    state.searchError = "Indique au moins un titre ou un artiste.";
    render();
    return;
  }
  state.loading = true;
  state.loadingMsg = "Recherche YouTube...";
  render();
  try {
    const data = await ytFetch("search", {
      part: "snippet",
      q: `${title} ${artist}`,
      type: "video",
      maxResults: "5",
      order: "relevance"
    });
    if (!data.items || !data.items.length) throw new Error("Aucune vidéo trouvée.");
    const top = data.items[0];
    const details = await getVideosDetails([top.id.videoId]);
    if (!details.length) throw new Error("Impossible de récupérer les stats.");
    const v = details[0];
    const video = {
      id: v.id,
      title: v.snippet.title,
      channelId: v.snippet.channelId,
      channelTitle: v.snippet.channelTitle,
      thumbnail: v.snippet.thumbnails?.medium?.url || v.snippet.thumbnails?.default?.url,
      publishedAt: v.snippet.publishedAt,
      views: parseInt(v.statistics.viewCount || 0),
      likes: parseInt(v.statistics.likeCount || 0),
      commentCount: parseInt(v.statistics.commentCount || 0),
      duration: parseISODuration(v.contentDetails.duration)
    };
    await fsUpsertVideo(video, artist || v.snippet.channelTitle);
    await openAnalyse(video.id);
  } catch(e) {
    state.searchError = e.message;
  }
  state.loading = false;
  state.loadingMsg = "";
  render();
}

// ========================================================================
// BOOT
// ========================================================================
state.authLoading = true;
auth.onAuthStateChanged(user => {
  state.authLoading = false;
  state.user = user;
  if (user) {
    fsListenArtists();
    fsListenVideos();
  } else {
    if (unsubscribeVideos) unsubscribeVideos();
    if (unsubscribeArtists) unsubscribeArtists();
    unsubscribeVideos = null;
    unsubscribeArtists = null;
    state.trackedVideos = {};
    state.artists = [];
  }
  render();
});
render();
</script>
