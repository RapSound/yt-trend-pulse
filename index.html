    --txt: #F2F2F2;

    overflow-x: hidden;

  ::-webkit-scrollbar-thumb:hover { background: var(--red-dim); }

// ========================================================================
// YOUTUBE API - API publique visible (recherches dynamiques)
// ========================================================================
const YT_BASE = "https://www.googleapis.com/youtube/v3";

async function ytFetch(endpoint, params) {
  const url = new URL(YT_BASE + "/" + endpoint);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  url.searchParams.set("key", YOUTUBE_API_KEY_CLIENT);
  const res = await fetch(url.toString());
  const data = await res.json();
  if (!res.ok) {
    const reason = data?.error?.errors?.[0]?.reason || data?.error?.message || "erreur inconnue";
    throw new Error(reason);
  }
  return data;
}

function parseISODuration(iso) {
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return (parseInt(m[1]||0) * 3600) + (parseInt(m[2]||0) * 60) + parseInt(m[3]||0);
}

// ========================================================================
// YOUTUBE API - Pour les appels autonomes (via GitHub Actions)
// La clé API utilisée est celle dans les secrets GitHub
// ========================================================================

async function getUploadsPlaylistId(channelId) {
  const data = await ytFetch("channels", { part: "contentDetails", id: channelId });
  if (!data.items?.length) throw new Error("Chaîne invalide");
  return data.items[0].contentDetails.relatedPlaylists.uploads;
}

async function getRecentUploadIds(playlistId, max = 20) {
  const data = await ytFetch("playlistItems", { part: "contentDetails", playlistId, maxResults: String(max) });
  return (data.items||[]).map(it => it.contentDetails.videoId);
}

async function getVideosDetails(ids) {
  if (!ids.length) return [];
  const out = [];
  for (let i = 0; i < ids.length; i += 50) {
    const chunk = ids.slice(i, i+50);
    const data = await ytFetch("videos", { part: "snippet,statistics,contentDetails", id: chunk.join(",") });
    out.push(...(data.items||[]));
  }
  return out;
}

async function getChannelInfo(channelId) {
  const data = await ytFetch("channels", { part: "snippet,statistics", id: channelId });
  if (!data.items?.length) return null;
  return {
    title: data.items[0].snippet.title,
    thumbnail: data.items[0].snippet.thumbnails?.default?.url,
    subscribers: parseInt(data.items[0].statistics.subscriberCount || 0),
  };
}

async function fsGetArtists() {
  try {
    const doc = await db.collection('meta').doc('artists').get();
    if (doc.exists) {
      const data = doc.data();
      return data.list || [];
    }
    return [];
  } catch (e) {
    console.error("Erreur fsGetArtists:", e);
    return [];
  }
}

async function fsAddArtist(artistName, channelId) {
  const ref = db.collection('meta').doc('artists');
  const doc = await ref.get();
  let list = [];
  if (doc.exists) {
    list = doc.data().list || [];
  }
  list.push({
    name: artistName,
    channelId: channelId,
    addedAt: new Date().toISOString()
  });
  await ref.set({ list: list }, { merge: true });
}

async function fsRemoveArtist(artistName) {
  const ref = db.collection('meta').doc('artists');
  const doc = await ref.get();
  if (doc.exists) {
    const list = (doc.data().list || []).filter(a => a.name !== artistName);
    await ref.set({ list: list }, { merge: true });
  }
}

async function fsUpsertVideo(video, artist) {
  const ref = db.collection('videos').doc(video.id);
  const nowIso = new Date().toISOString();
  const dateKey = nowIso.slice(0, 10);
  const potential = computeEngagementScore(video.likes, video.views);
  const snap = {
    t: nowIso,
    views: video.views,
    likes: video.likes,
    commentCount: video.commentCount || 0,
    potential
  };

  const doc = await ref.get();
  const prevRecent = doc.exists ? (doc.data().snapshotsRecent || []) : [];
  const recent = [...prevRecent.filter(s => s.t.slice(0, 10) !== dateKey), snap]
    .sort((a, b) => a.t.localeCompare(b.t))
    .slice(-10);

  const manualCategory = doc.exists ? (doc.data().manualCategory || null) : null;
  const userValidated = doc.exists ? (doc.data().userValidated || false) : false;

  await ref.set({
    title: video.title,
    artist: artist,
    channelId: video.channelId,
    channelTitle: video.channelTitle,
    thumbnail: video.thumbnail,
    publishedAt: video.publishedAt,
    duration: video.duration || 0,
    views: video.views,
    likes: video.likes,
    commentCount: video.commentCount || 0,
    snapshotsRecent: recent,
    lastUpdated: nowIso,
    frozen: doc.exists ? (doc.data().frozen || false) : false,
    frozenAt: doc.exists ? (doc.data().frozenAt || null) : null,
    manualCategory: manualCategory,
    userValidated: userValidated || false,
    deleted: doc.exists ? (doc.data().deleted || false) : false,
  }, { merge: true });

  await ref.collection('snapshots').doc(dateKey).set(snap, { merge: true });
}

async function fsFetchFullSnapshots(videoId) {
  try {
    const qs = await db.collection('videos').doc(videoId).collection('snapshots').orderBy('t', 'asc').get();
    return qs.docs.map(d => d.data());
  } catch (e) {
    return [];
  }
}

// ========================================================================
// SCORING & CLASSIFICATION
// ========================================================================
function computeEngagementScore(likes, views) {
  if (!views) return 0;
  const ratio = (likes / views) * 100;
  return Math.max(0, Math.min(100, (ratio / 10) * 100));
}

function computeVelocityScore(snapshots) {
  if (!snapshots || snapshots.length < 2) return { score: null, viewsPerHour: 0 };
  const last = snapshots[snapshots.length-1];
  const prev = snapshots[snapshots.length-2];
  const dt = Math.max((new Date(last.t) - new Date(prev.t)) / 3600000, 0.1);
  const viewsPerHour = (last.views - prev.views) / dt;
  return {
    score: Math.max(0, Math.min(100, (viewsPerHour / 5000) * 100)),
    viewsPerHour
  };
}

function computeFinalScore(video) {
  const engagement = computeEngagementScore(video.likes, video.views);
  const velocity = computeVelocityScore(video.snapshotsRecent || []);
  const age = daysSince(video.publishedAt);
  const ageBonus = Math.max(0, Math.min(20, (30 - age) / 30 * 20));
  const freezeBonus = video.frozen ? 10 : 0;
  const total = engagement * 0.4 + (velocity.score ?? 50) * 0.3 + ageBonus * 0.3 + freezeBonus;
  return {
    total: Math.round(Math.min(100, total)),
    breakdown: {
      engagement: Math.round(engagement),
      velocity: velocity.score == null ? null : Math.round(velocity.score),
      ageBonus: Math.round(ageBonus),
      freezeBonus
    }
  };
}

function classify(video) {
  if (video.userValidated && video.manualCategory) {
    return video.manualCategory;
  }

  const engagement = computeEngagementScore(video.likes, video.views);
  const age = daysSince(video.publishedAt);
  const snaps = video.snapshotsRecent || [];
  
  const hasPeak = detectBreakout(snaps) || (snaps.length >= 3 && 
    snaps[snaps.length-1].views > snaps[snaps.length-2].views * 1.3);

  if (age <= 7 && engagement >= 50 && hasPeak) {
    return "petite";
  }
  
  if (age > 7 && age <= 30 && engagement >= 30 && hasPeak) {
    return "grande";
  }

  if (engagement >= 60 && hasPeak) {
    return "grande";
  }

  if (age <= 30 && engagement >= 20 && !hasPeak) {
    return "douteux";
  }

  return "hors-fenetre";
}

function daysSince(dateStr) {
  return (Date.now() - new Date(dateStr).getTime()) / 86400000;
}

function detectBreakout(snapshots) {
  if (!snapshots || snapshots.length < 3) return false;
  const v = snapshots.slice(-3).map(x => x.views);
  return v[1] - v[0] > 0 && (v[2] - v[1]) > (v[1] - v[0]) * 1.8;
}

function detectSlowdown(snapshots) {
  if (!snapshots || snapshots.length < 3) return false;
  const v = snapshots.slice(-3).map(x => x.views);
  return v[1] - v[0] > 0 && (v[2] - v[1]) < (v[1] - v[0]) * 0.4;
}

function detectStagnation(snapshots) {
  if (!snapshots || snapshots.length < 7) return false;
  const r = snapshots.slice(-7);
  const spread = Math.max(...r.map(x => x.views)) - Math.min(...r.map(x => x.views));
  const avg = r.reduce((a, x) => a + x.views, 0) / r.length;
  return (spread / avg) < 0.02;
}

function deriveVideo(v) {
  if (v.deleted) {
    return { ...v, category: "supprime", score: 0, deleted: true };
  }

  const snaps = v.snapshotsRecent || [];
  const category = classify(v);
  const scoreData = computeFinalScore(v);
  
  return {
    ...v,
    category,
    score: scoreData.total,
    breakdown: scoreData.breakdown,
    breakout: detectBreakout(snaps),
    slowdown: detectSlowdown(snaps),
    stagnation: category === "grande" && detectStagnation(snaps),
    comments: v.comments || null,
    fullSnapshots: v.fullSnapshots || null,
    needsValidation: category === "douteux" && !v.userValidated,
    focusEnabled: v.focusEnabled || false,
    focusInterval: v.focusInterval || 30,
  };
}

// FIRESTORE LISTENERS
// ========================================================================
function fsListenArtists() {
  if (unsubscribeArtists) unsubscribeArtists();
  unsubscribeArtists = db.collection('meta').doc('artists').onSnapshot(doc => {
    if (doc.exists) {
      const data = doc.data();
      state.artists = data.list || [];
      state.artists.forEach(a => {
        if (!state.artistLogos[a.channelId]) {
          getChannelInfo(a.channelId).then(info => {
            if (info) {
              state.artistLogos[a.channelId] = info.thumbnail;
              render();
            }
          }).catch(() => {});
        }
      });
    } else {
      state.artists = [];
    }
    render();
  }, err => {
    console.error("Erreur écoute artistes:", err);
  });
}

function fsListenVideos() {
  if (unsubscribeVideos) unsubscribeVideos();
  unsubscribeVideos = db.collection('videos').onSnapshot(qs => {
    qs.docChanges().forEach(change => {
      const id = change.doc.id;
      if (change.type === 'removed') {
        delete state.trackedVideos[id];
        return;
      }
      const data = change.doc.data();
      const existing = state.trackedVideos[id] || {};
      state.trackedVideos[id] = deriveVideo({ ...existing, ...data, id });
    });
    evaluateNotifications();
    state.lastSync = new Date();
    render();
  }, err => {
    addNotification("error", "Erreur Firestore: " + err.message);
    render();
  });
}

// ========================================================================
// NOTIFICATIONS
// ========================================================================
function addNotification(type, msg, data = {}) {
  const id = Date.now() + Math.random();
  state.notifications.push({
    id,
    type,
    msg,
    data,
    resolved: false,
    createdAt: new Date().toISOString()
  });
  render();
}

function resolveNotification(id) {
  const notif = state.notifications.find(n => n.id === id);
  if (notif) {
    notif.resolved = true;
    render();
  }
}

function clearResolvedNotifications() {
  state.notifications = state.notifications.filter(n => !n.resolved);
  render();
}

function evaluateNotifications() {
  Object.values(state.trackedVideos).forEach(v => {
    if (v.deleted || v.frozen) return;
    const hasNotif = state.notifications.some(n => 
      n.data.videoId === v.id && !n.resolved
    );
    if (v.breakout && !hasNotif) {
      addNotification("breakout", `🔥 ${v.title} - ${v.artist} en montée fracassante !`, { videoId: v.id });
    }
    if (v.slowdown && !hasNotif) {
      addNotification("late", `⚠️ ${v.title} - ${v.artist} ralentit`, { videoId: v.id });
    }
    if (v.stagnation && !hasNotif) {
      addNotification("stagnation", `📊 ${v.title} - ${v.artist} stagne depuis 7 jours`, { videoId: v.id });
    }
  });
}

// ========================================================================
// SYNC - Uniquement avec les artistes enregistrés
// La clé API utilisée est celle des secrets GitHub (autonome)
// ========================================================================
async function syncAll() {
  if (state.syncInProgress) return;
  
  if (state.artists.length === 0) {
    addNotification("info", "Aucun artiste suivi. Ajoute des chaînes d'abord !");
    render();
    return;
  }

  state.syncInProgress = true;
  state.loading = true;
  state.isLoadingShown = true;
  render();

  let totalVideos = 0;
  for (const artist of state.artists) {
    state.loadingMsg = `Collecte pour ${artist.name}...`;
    render();
    try {
      const playlistId = await getUploadsPlaylistId(artist.channelId);
      const ids = await getRecentUploadIds(playlistId, 20);
      const details = await getVideosDetails(ids);
      for (const v of details) {
        const video = {
          id: v.id,
          title: v.snippet.title,
          channelId: artist.channelId,
          channelTitle: v.snippet.channelTitle,
          thumbnail: v.snippet.thumbnails?.medium?.url || v.snippet.thumbnails?.default?.url,
          publishedAt: v.snippet.publishedAt,
          views: parseInt(v.statistics.viewCount || 0),
          likes: parseInt(v.statistics.likeCount || 0),
          commentCount: parseInt(v.statistics.commentCount || 0),
          duration: parseISODuration(v.contentDetails.duration)
        };
        await fsUpsertVideo(video, artist.name);
        totalVideos++;
      }
    } catch(e) {
      addNotification("error", `Erreur pour ${artist.name}: ${e.message}`);
    }
  }

  // Mise à jour des vidéos figées
  try {
    const frozenSnap = await db.collection('videos').where('frozen', '==', true).get();
    if (!frozenSnap.empty) {
      const frozenIds = frozenSnap.docs.map(d => d.id);
      const frozenData = {};
      frozenSnap.docs.forEach(d => frozenData[d.id] = d.data());
      const details = await getVideosDetails(frozenIds);
      for (const v of details) {
        const existing = frozenData[v.id];
        if (!existing) continue;
        const artistExists = state.artists.some(a => a.name === existing.artist);
        if (!artistExists) continue;
        const video = {
          id: v.id,
          title: v.snippet.title,
          channelId: existing.channelId,
          channelTitle: v.snippet.channelTitle,
          thumbnail: v.snippet.thumbnails?.medium?.url || v.snippet.thumbnails?.default?.url,
          publishedAt: v.snippet.publishedAt,
          views: parseInt(v.statistics.viewCount || 0),
          likes: parseInt(v.statistics.likeCount || 0),
          commentCount: parseInt(v.statistics.commentCount || 0),
          duration: parseISODuration(v.contentDetails.duration)
        };
        await fsUpsertVideo(video, existing.artist);
        totalVideos++;
      }
    }
  } catch(e) {
    addNotification("error", "Erreur mise à jour figés: " + e.message);
  }

  state.loading = false;
  state.isLoadingShown = false;
  state.loadingMsg = "";
  state.syncInProgress = false;
  state.isInitialSync = false;
  addNotification("info", `${totalVideos} vidéo(s) mises à jour.`);
  render();
}

// Planifier la sync à 00:00 tous les jours
function scheduleDailySync() {
  const now = new Date();
  const tomorrow = new Date(now);
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0, 0, 0, 0);
  const msUntilMidnight = tomorrow - now;
  
  setTimeout(() => {
    syncAll();
    setInterval(syncAll, 24 * 60 * 60 * 1000);
  }, msUntilMidnight);
}

// ========================================================================
async function addArtist() {
  const nameInput = document.getElementById('artist-name');
  const channelInput = document.getElementById('artist-channel');
  const name = nameInput?.value.trim();
  const channelId = channelInput?.value.trim();

  if (!name || !channelId) {
    addNotification("error", "Remplis le nom et l'ID de chaîne.");
    render();
    return;
  }

  if (state.artists.some(a => a.name.toLowerCase() === name.toLowerCase())) {
    addNotification("error", `"${name}" est déjà suivi.`);
    render();
    return;
  }

  try {
    const info = await getChannelInfo(channelId);
    if (!info) {
      addNotification("error", "ID de chaîne invalide.");
      render();
      return;
    }
    state.artistLogos[channelId] = info.thumbnail;
    await fsAddArtist(name, channelId);
    if (nameInput) nameInput.value = '';
    if (channelInput) channelInput.value = '';
    addNotification("info", `"${name}" ajouté avec succès ! (${info.title})`);
    setTimeout(() => syncAll(), 1000);
  } catch(e) {
    addNotification("error", "Erreur: " + e.message);
    render();
  }
}

async function removeArtist(name) {
  if (confirm(`Supprimer "${name}" de la liste de suivi ?`)) {
    const artist = state.artists.find(a => a.name === name);
    if (artist) {
      delete state.artistLogos[artist.channelId];
    }
    await fsRemoveArtist(name);
    if (state.selectedArtist === name) {
      state.selectedArtist = null;
    }
    addNotification("info", `"${name}" supprimé.`);
  }
}

// ========================================================================
async function openAnalyse(videoId) {
  state.selectedVideoId = videoId;
  state.activeTab = "analyse";
  state.sidebarOpen = false;
  render();
  
  const v = state.trackedVideos[videoId];
  if (v && v.fullSnapshots == null) {
    const full = await fsFetchFullSnapshots(videoId);
    if (state.trackedVideos[videoId]) {
      state.trackedVideos[videoId].fullSnapshots = full;
      render();
    }
  }
  
  // Charger les commentaires (API publique visible)
  if (v && v.comments == null) {
    try {
      const comments = await getVideoComments(videoId);
      if (state.trackedVideos[videoId]) {
        state.trackedVideos[videoId].comments = comments;
        render();
      }
    } catch(e) {
      if (state.trackedVideos[videoId]) {
        state.trackedVideos[videoId].comments = { error: e.message };
        render();
      }
    }
  }
  
  if (v && v.focusEnabled) {
    state.focusVideoId = videoId;
    state.focusInterval = v.focusInterval || 30;
    if (!state.focusData) {
      state.focusData = v.fullSnapshots || [];
    }
    render();
  }
}

  if (state.modalVideoId) {

    state.focusInterval = interval;
    state.focusVideoId = state.modalVideoId;
    state.focusData = state.trackedVideos[state.modalVideoId]?.fullSnapshots || [];
    state.showModal = false;
    state.modalVideoId = null;
    addNotification("info", `Focus activé toutes les ${interval} minutes.`);

  }

// ========================================================================
// API PUBLIQUE VISIBLE - Récupération des commentaires
// ========================================================================
async function getVideoComments(videoId, max = 12) {
  try {
    const data = await ytFetch("commentThreads", {
      part: "snippet",
      videoId,
      maxResults: String(max),
      order: "relevance",
      textFormat: "plainText"
    });
    return {
      items: (data.items||[]).map(it => {
        const c = it.snippet.topLevelComment.snippet;
        return {
          author: c.authorDisplayName,
          text: c.textDisplay,
          likeCount: c.likeCount,
          publishedAt: c.publishedAt,
          authorImg: c.authorProfileImageUrl
        };
      })
    };
  } catch(e) {
    return { error: "Commentaires non disponibles: " + e.message };
  }
}

// ========================================================================
// HELPERS
// ========================================================================
function fmtNum(n) {
  if (n == null) return "—";
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, "") + "k";
  return String(n);
}

function fmtAge(publishedAt) {
  const d = daysSince(publishedAt);
  if (d < 1) return Math.round(d * 24) + "h";
  if (d < 30) return Math.round(d) + "j";
  return Math.round(d / 30) + "mois";
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
}

function scoreColor(score) {
  if (score >= 70) return COLORS.green;
  if (score >= 40) return COLORS.amber;
  return COLORS.red;
}

function scoreRing(score, size = 56) {
  const r = (size - 8) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (score / 100) * c;
  return `<svg width="${size}" height="${size}" class="score-ring">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="#2A2A2A" stroke-width="5" fill="none"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${scoreColor(score)}" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
  </svg>`;
}

function sparkline(snapshots, key = 'views', w = 100, h = 28) {
  if (!snapshots || snapshots.length < 2) {
    return `<div class="text-[10px] text-[var(--txt-dim)]" style="height:${h}px">en mesure...</div>`;
  }
  const vals = snapshots.slice(-10).map(s => s[key] || 0);
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const range = (max - min) || 1;
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * w;
    const y = h - ((v - min) / range) * h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  const color = vals[vals.length-1] >= vals[0] ? COLORS.green : COLORS.red;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

// ========================================================================
// CALCUL DES VARIATIONS POUR LA COURBE
// ========================================================================
function calculateVariation(data) {
  if (!data || data.length < 2) return 0;
  const first = data[0];
  const last = data[data.length - 1];
  if (first === 0) return 0;
  return ((last - first) / first) * 100;
}

function getVariationClass(variation) {
  if (variation > 0) return 'variation-up';
  if (variation < 0) return 'variation-down';
  return 'variation-neutral';
}

function formatVariation(variation) {
  if (variation === 0) return '±0%';
  const sign = variation > 0 ? '+' : '';
  return `${sign}${variation.toFixed(1)}%`;
}

function getPodium() {
  const artistNames = new Set(state.artists.map(a => a.name));
  
  const allVideos = Object.values(state.trackedVideos)
    .filter(v => 
      !v.deleted && 
      v.category !== "supprime" &&
      artistNames.has(v.artist)
    )
    .sort((a, b) => b.score - a.score);
  return allVideos.slice(0, 10);
}

function getVideosForTab(category) {
  const artistNames = new Set(state.artists.map(a => a.name));
  return Object.values(state.trackedVideos)
    .filter(v => 
      v.category === category && 
      !v.deleted && 
      artistNames.has(v.artist) &&
      (!state.quickFilter || v.artist.toLowerCase().includes(state.quickFilter.toLowerCase()))
    )
    .sort((a, b) => b.score - a.score);
}

function isRecent(video) {
  return daysSince(video.publishedAt) <= 7;
}

                  ${n.data.videoId ? `<button onclick="openAnalyse('${n.data.videoId}')" class="text-[10px] px-2 py-1 rounded bg-[#262626] hover:bg-[#333] transition">Voir</button>` : ''}
                  ${n.data.videoId ? `<button onclick="openPlayer('${n.data.videoId}')" class="text-[10px] px-2 py-1 rounded bg-red-600/30 text-red-300 hover:bg-red-600 transition"><i class="fa-solid fa-play"></i></button>` : ''}
                </div>
              </div>
              ${!n.resolved ? `<button onclick="resolveNotification('${n.id}')" class="text-[var(--txt-dim)] hover:text-white text-xs"><i class="fa-solid fa-check"></i></button>` : ''}
            </div>
          </div>
        `).join("") : `<div class="flex flex-col items-center justify-center py-16 text-[var(--txt-dim)]"><i class="fa-solid fa-bell-slash text-2xl mb-3 opacity-40"></i><p class="text-sm text-center">Aucune notification</p></div>`}
      </div>
    </aside>

    <!-- Mini Player -->
    ${state.currentVideoId ? `
    <div class="fixed bottom-0 left-0 right-0 bg-[var(--panel)] border-t border-[#1f1f1f] p-2 z-30">
      <div class="flex items-center gap-3 max-w-4xl mx-auto">
        <div class="flex-1" style="max-width:300px;">
          <iframe 
            src="https://www.youtube.com/embed/${state.currentVideoId}?autoplay=1&rel=0&modestbranding=1" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen
            style="width:100%;height:50px;border:none;border-radius:8px;">
          </iframe>
        </div>
        <div class="flex-1 min-w-0 hidden sm:block">
          <div class="text-sm font-semibold truncate">${state.trackedVideos[state.currentVideoId]?.title || 'Lecture...'}</div>
          <div class="text-xs text-[var(--txt-dim)]">${state.trackedVideos[state.currentVideoId]?.artist || ''}</div>
        </div>
        <button onclick="closePlayer()" class="text-[var(--txt-dim)] hover:text-white"><i class="fa-solid fa-xmark"></i></button>
      </div>
    </div>` : ''}

    ${state.showModal ? renderModal() : ''}
  </div>`;

  if (state.activeTab === "analyse") {
    setTimeout(renderAnalyseCharts, 100);
  }
  setupInfiniteScroll();
}

function renderModal() {
  const v = state.modalVideoId ? state.trackedVideos[state.modalVideoId] : null;
  if (!v) return '';
  
  if (state.modalVideoId && state.activeTab === "analyse") {
    return `
    <div class="modal-overlay" onclick="if(event.target===this) {state.showModal=false; state.modalVideoId=null; render();}">
      <div class="modal-box">
        <h3>🎯 Focus sur "${v.title}"</h3>
        <p class="text-xs text-[var(--txt-dim)] mt-1">${v.artist}</p>
        <p class="text-xs text-[var(--txt-dim)] mt-2">Intervalle de rafraîchissement :</p>
        <div class="flex flex-wrap gap-2 mt-3">
          <button class="px-3 py-2 rounded-lg bg-[#1a1a1a] hover:bg-[#2a2a2a] text-white text-sm" onclick="setFocusInterval(15)">15 min</button>
          <button class="px-3 py-2 rounded-lg bg-[#1a1a1a] hover:bg-[#2a2a2a] text-white text-sm" onclick="setFocusInterval(30)">30 min</button>
          <button class="px-3 py-2 rounded-lg bg-[#1a1a1a] hover:bg-[#2a2a2a] text-white text-sm" onclick="setFocusInterval(60)">60 min</button>
          <button class="px-3 py-2 rounded-lg bg-[#1a1a1a] hover:bg-[#2a2a2a] text-white text-sm" onclick="setFocusInterval(120)">120 min</button>
        </div>
        <div class="flex gap-2 mt-4">
          <button class="flex-1 px-4 py-2 rounded-lg bg-red-600/30 text-red-300 hover:bg-red-600 text-sm" onclick="clearFocus(); state.showModal=false; state.modalVideoId=null; render();">Désactiver</button>
          <button class="flex-1 px-4 py-2 rounded-lg bg-[#1a1a1a] hover:bg-[#2a2a2a] text-white text-sm" onclick="state.showModal=false; state.modalVideoId=null; render();">Annuler</button>
        </div>
      </div>
    </div>`;
  }
  
  return `
  <div class="modal-overlay" onclick="if(event.target===this) setVideoCategory(null)">
    <div class="modal-box">
      <h3>❓ Classification</h3>
      <p><strong>${v.title}</strong> - ${v.artist}</p>
      <p>Engagement: ${v.breakdown.engagement}% · Âge: ${fmtAge(v.publishedAt)}</p>
      <p class="text-xs text-[var(--txt-dim)]">Choisis la catégorie :</p>
      <div class="btn-group flex flex-wrap gap-2 mt-4">
        <button class="primary flex-1 min-w-[80px] px-4 py-2 rounded-lg bg-red-600 hover:bg-red-500 text-white" onclick="setVideoCategory('grande')">✅ Grande</button>
        <button class="flex-1 min-w-[80px] px-4 py-2 rounded-lg bg-[#1a1a1a] hover:bg-[#2a2a2a] text-white" onclick="setVideoCategory('petite')">📈 Petite</button>
        <button class="flex-1 min-w-[80px] px-4 py-2 rounded-lg bg-[#1a1a1a] hover:bg-[#2a2a2a] text-white" onclick="setVideoCategory('hors-fenetre')">⏭️ Hors</button>
        <button class="flex-1 min-w-[80px] px-4 py-2 rounded-lg bg-[#1a1a1a] hover:bg-[#2a2a2a] text-white" onclick="setVideoCategory(null); state.showModal=false; render();">❌ Annuler</button>
      </div>
    </div>
  </div>`;
}

function toggleSidebar() {
  state.sidebarOpen = !state.sidebarOpen;
  render();
}

function headerTitle() {
  const titles = {
    podium: "🏆 Podium Rap FR",
    analyse: "🔍 Analyse",
    charts: "📊 Charts FR",
    artistes: state.selectedArtist ? `🎤 ${state.selectedArtist}` : "📋 Artistes suivis"
  };
  return titles[state.activeTab] || "Dashboard";
}

function headerSubtitle() {
  if (state.activeTab === "artistes" && state.selectedArtist) {
    const videos = Object.values(state.trackedVideos).filter(v => v.artist === state.selectedArtist && !v.deleted);
    return `${videos.length} son(s) · Clique sur un son pour l'analyser`;
  }
  const subtitles = {
    podium: "Grandes, Petites et Non classés (artistes suivis uniquement)",
    analyse: "Détails, score, focus et courbes avec variations",
    charts: "Tendances YouTube Musique France",
    artistes: "Gestion des chaînes suivies"
  };
  return subtitles[state.activeTab] || "";
}

function notifIcon(type) {
  const icons = {
    breakout: '<i class="fa-solid fa-bolt text-green-400"></i>',
    late: '<i class="fa-solid fa-triangle-exclamation text-red-400"></i>',
    stagnation: '<i class="fa-solid fa-pause text-amber-400"></i>',
    error: '<i class="fa-solid fa-circle-exclamation text-gray-400"></i>',
    info: '<i class="fa-solid fa-circle-info text-blue-400"></i>'
  };
  return icons[type] || '<i class="fa-solid fa-bell text-gray-400"></i>';
}

function notifClass(type) {
  const classes = {
    breakout: "alert-breakout",
    late: "alert-late",
    stagnation: "alert-stagnation",
  };
  return classes[type] || "";
}

// ========================================================================
// RENDER ACTIVE TAB
// ========================================================================
function renderActiveTab() {
  switch(state.activeTab) {
    case "podium": return renderPodium();
    case "analyse": return renderAnalyse();
    case "charts": return renderCharts();
    case "artistes": return renderArtistes();
    default: return renderPodium();
  }
}

// ========================================================================
// PODIUM
// ========================================================================
function renderPodium() {
  const podium = getPodium();
  if (!podium.length) {
    return `<div class="flex flex-col items-center justify-center py-16 text-[var(--txt-dim)]">
      <i class="fa-solid fa-trophy text-3xl mb-3 opacity-40"></i>
      <p class="text-sm text-center max-w-xs">Pas assez de données. Ajoute des artistes et lance une collecte.</p>
    </div>`;
  }

  const grandes = podium.filter(v => v.category === "grande");
  const petites = podium.filter(v => v.category === "petite");
  const nonClasses = podium.filter(v => v.category === "douteux" || v.category === "hors-fenetre");

  return `
  ${grandes.length ? `
  <div class="mb-6">
    <h2 class="text-sm font-mono text-[var(--txt-dim)] mb-3">🔥 Grandes Tendances</h2>
    <div class="video-grid">
      ${grandes.map(v => videoCard(v, true)).join("")}
    </div>
  </div>` : ''}
  
  ${petites.length ? `
  <div class="mb-6">
    <h2 class="text-sm font-mono text-[var(--txt-dim)] mb-3">⚡ Petites Tendances</h2>
    <div class="video-grid">
      ${petites.map(v => videoCard(v, true)).join("")}
    </div>
  </div>` : ''}
  
  ${nonClasses.length ? `
  <div>
    <h2 class="text-sm font-mono text-[var(--txt-dim)] mb-3">📊 Non classés (API sollicitée)</h2>
    <div class="video-grid">
      ${nonClasses.map(v => videoCard(v, true)).join("")}
    </div>
  </div>` : ''}`;
}

function videoCard(v, showDelete = true) {
  const isRecent = daysSince(v.publishedAt) <= 7;
  const fireClass = isRecent ? ' fire-border' : '';
  
  const catBadge = v.category === "grande"
    ? `<span class="badge bg-red-900/40 text-red-300 border border-red-800">GRANDE</span>`
    : v.category === "petite"
    ? `<span class="badge bg-blue-900/40 text-blue-300 border border-blue-800">PETITE</span>`
    : v.category === "douteux"
    ? `<span class="badge bg-amber-900/40 text-amber-300 border border-amber-800">⚠️ DOUTEUX</span>`
    : `<span class="badge bg-gray-800 text-gray-400 border border-gray-700">NON CLASSÉ</span>`;

  return `
  <div class="card p-3 flex flex-col gap-2 relative ${fireClass}">
    ${v.breakout ? `<div class="absolute top-2 right-2 pulse-dot w-2 h-2 rounded-full bg-green-400"></div>` : ""}
    ${v.frozen ? `<div class="absolute top-2 right-2 text-red-500"><i class="fa-solid fa-lock text-xs"></i></div>` : ""}
    ${isRecent ? `<div class="absolute top-2 left-2 text-orange-400 text-xs"><i class="fa-solid fa-fire"></i></div>` : ""}
    
    <div class="flex gap-3 cursor-pointer" onclick="openAnalyse('${v.id}')">
      <img src="${v.thumbnail}" class="w-24 h-16 object-cover rounded-lg border border-[#2a2a2a] flex-shrink-0" />
      <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold truncate" title="${v.title}">${v.title}</p>
        <p class="text-xs text-[var(--txt-dim)] font-mono">${v.artist} · ${fmtAge(v.publishedAt)}</p>
        <div class="mt-1 flex flex-wrap gap-1">${catBadge}</div>
      </div>
      <div class="flex flex-col items-center justify-center relative shrink-0">${scoreRing(v.score, 44)}<span class="absolute font-display text-xs" style="color:${scoreColor(v.score)}">${v.score}</span></div>
    </div>
    
    <div class="border-t border-[#2a2a2a] pt-2">${sparkline(v.snapshotsRecent)}</div>
    
    <div class="flex items-center justify-between gap-2 text-xs flex-wrap">
      <div class="flex gap-2 text-[var(--txt-dim)] font-mono">
        <span>${fmtNum(v.views)} vues</span>
        <span>${v.breakdown.engagement}% eng.</span>
      </div>
      <div class="flex gap-1 flex-wrap">
        <button onclick="event.stopPropagation(); openPlayer('${v.id}')" class="px-2 py-1 rounded-lg text-[10px] font-semibold transition bg-red-600/30 text-red-300 hover:bg-red-600"><i class="fa-solid fa-play"></i></button>
        <button onclick="event.stopPropagation(); toggleFreeze('${v.id}')" class="px-2 py-1 rounded-lg text-[10px] font-semibold transition ${v.frozen ? 'bg-red-900/50 text-red-300 cursor-default' : 'bg-[#262626] text-[var(--txt-dim)] hover:text-white hover:bg-red-600'}">
          <i class="fa-solid ${v.frozen ? 'fa-lock' : 'fa-lock-open'}"></i>
        </button>
        ${showDelete ? `<button onclick="event.stopPropagation(); deleteVideo('${v.id}')" class="px-2 py-1 rounded-lg text-[10px] font-semibold transition text-[var(--txt-dim)] hover:text-red-500"><i class="fa-solid fa-trash"></i></button>` : ""}
      </div>
    </div>
  </div>`;
}

// ========================================================================
// RENDER ARTISTES
// ========================================================================
function renderArtistes() {
  if (state.selectedArtist) {
    return renderArtistDetail(state.selectedArtist);
  }

  const artistVideoCount = {};
  Object.values(state.trackedVideos).forEach(v => {
    if (!v.deleted) {
      artistVideoCount[v.artist] = (artistVideoCount[v.artist] || 0) + 1;
    }
  });

  return `
  <div class="max-w-3xl">
    <div class="card p-4 mb-4">
      <p class="text-xs text-[var(--txt-dim)] mb-3">Ajoute des chaînes YouTube à suivre.</p>
      <div class="flex gap-2 flex-wrap">
        <input id="artist-name" type="text" placeholder="Nom (ex: JUL)" class="flex-1 min-w-[120px] px-3 py-2 rounded-lg text-sm" />
        <input id="artist-channel" type="text" placeholder="ID de chaîne" class="flex-1 min-w-[150px] px-3 py-2 rounded-lg text-sm" />
        <button onclick="addArtist()" class="px-4 py-2 rounded-lg bg-red-600 hover:bg-red-500 text-white text-sm font-semibold transition"><i class="fa-solid fa-plus mr-1"></i>Ajouter</button>
      </div>
      <p class="text-[10px] text-[var(--txt-dim)] mt-2">ID: youtube.com/channel/<span class="text-red-400">UC...xxx</span></p>
    </div>

    ${state.artists.length ? `
      <div class="flex flex-col gap-2">
        <div class="flex justify-between items-center mb-2">
          <span class="text-xs text-[var(--txt-dim)]">${state.artists.length} artiste(s) suivi(s) · ${Object.keys(artistVideoCount).length} avec des sons</span>
          <button onclick="document.querySelectorAll('.artist-delete').forEach(b => b.classList.toggle('hidden'))" class="text-xs text-[var(--txt-dim)] hover:text-white underline">Gérer</button>
        </div>
        ${state.artists.map(a => {
          const hasRecent = Object.values(state.trackedVideos).some(v => v.artist === a.name && isRecent(v) && !v.deleted);
          const fireClass = hasRecent ? ' fire-border' : '';
          const videoCount = artistVideoCount[a.name] || 0;
          const logoUrl = state.artistLogos[a.channelId] || `https://ui-avatars.com/api/?name=${encodeURIComponent(a.name)}&background=FF0000&color=fff&size=128`;
          
          return `
          <div class="card p-3 flex items-center justify-between artist-item ${fireClass}" onclick="selectArtist('${a.name}')">
            <div class="flex items-center gap-3" style="cursor:pointer;">
              <img src="${logoUrl}" class="artist-logo" alt="${a.name}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(a.name)}&background=FF0000&color=fff&size=128'" />
              <div>
                <span class="font-semibold">${a.name}</span>
                ${hasRecent ? '<span class="text-orange-400 text-xs ml-1"><i class="fa-solid fa-fire"></i></span>' : ''}
                <span class="text-[10px] text-[var(--txt-dim)] ml-2">${videoCount} son${videoCount > 1 ? 's' : ''}</span>
              </div>
            </div>
            <button class="artist-delete hidden text-red-500 hover:text-red-400 text-sm" onclick="event.stopPropagation(); removeArtist('${a.name}')"><i class="fa-solid fa-trash"></i></button>
          </div>`;
        }).join("")}
      </div>
    ` : `<div class="flex flex-col items-center justify-center py-12 text-[var(--txt-dim)]"><i class="fa-solid fa-users text-2xl mb-3 opacity-40"></i><p class="text-sm">Aucun artiste suivi.</p></div>`}
  </div>`;
}

// ========================================================================
// ARTIST DETAIL
// ========================================================================
function renderArtistDetail(artistName) {
  const videos = Object.values(state.trackedVideos)
    .filter(v => v.artist === artistName && !v.deleted)
    .sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));

  const artistInfo = state.artists.find(a => a.name === artistName);
  const logoUrl = artistInfo ? (state.artistLogos[artistInfo.channelId] || `https://ui-avatars.com/api/?name=${encodeURIComponent(artistName)}&background=FF0000&color=fff&size=128`) : '';

  return `
  <div class="max-w-4xl">
    <div class="artist-detail-header">
      <button class="back-btn" onclick="selectArtist(null)"><i class="fa-solid fa-arrow-left text-xl"></i></button>
      <img src="${logoUrl}" class="artist-logo" style="width:56px;height:56px;" alt="${artistName}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(artistName)}&background=FF0000&color=fff&size=128'" />
      <div>
        <h2 class="text-xl font-display">${artistName}</h2>
        <p class="text-xs text-[var(--txt-dim)]">${videos.length} son(s) · ${videos.filter(v => isRecent(v)).length} récent(s)</p>
      </div>
    </div>

    ${videos.length ? `
      <div class="video-grid">
        ${videos.map(v => videoCard(v, true)).join("")}
      </div>
    ` : `
      <div class="flex flex-col items-center justify-center py-12 text-[var(--txt-dim)]">
        <i class="fa-solid fa-music text-3xl mb-3 opacity-40"></i>
        <p class="text-sm">Aucun son trouvé pour ${artistName}.</p>
      </div>
    `}
  </div>`;
}

function selectArtist(name) {
  state.selectedArtist = name;
  state.activeTab = "artistes";
  render();
}

// ========================================================================
// RENDER ANALYSE - Avec variations sur la courbe
// ========================================================================
function renderAnalyse() {
  const v = state.selectedVideoId ? state.trackedVideos[state.selectedVideoId] : null;
  return `
  <div class="max-w-4xl">
    <div class="card p-4 mb-4">
      <p class="text-xs text-[var(--txt-dim)] mb-2">Clique un morceau pour l'analyser, ou cherche un son :</p>
      <div class="flex gap-2 flex-wrap">
        <input id="search-title" type="text" placeholder="Titre" class="flex-1 min-w-[120px] px-3 py-2 rounded-lg text-sm" onkeydown="if(event.key==='Enter') runManualSearch()" />
        <input id="search-artist" type="text" placeholder="Artiste" class="flex-1 min-w-[120px] px-3 py-2 rounded-lg text-sm" onkeydown="if(event.key==='Enter') runManualSearch()" />
        <button onclick="runManualSearch()" class="px-4 py-2 rounded-lg bg-red-600 hover:bg-red-500 text-white text-sm font-semibold transition"><i class="fa-solid fa-magnifying-glass"></i></button>
      </div>
      ${state.searchError ? `<p class="text-xs text-red-400 mt-2">${state.searchError}</p>` : ""}
    </div>
    ${!v ? `<div class="flex flex-col items-center justify-center py-16 text-[var(--txt-dim)]"><i class="fa-solid fa-magnifying-glass-chart text-3xl mb-3 opacity-40"></i><p class="text-sm">Sélectionne un son à analyser.</p></div>` : renderAnalyseDetail(v)}
  </div>`;
}

function renderAnalyseDetail(v) {
  const isRecent = daysSince(v.publishedAt) <= 7;
  const fireClass = isRecent ? ' fire-border' : '';
  const hasFocus = v.focusEnabled || state.focusVideoId === v.id;
  
  // Calcul des variations
  const fullSnapshots = v.fullSnapshots || [];
  const viewsVariation = fullSnapshots.length >= 2 ? calculateVariation(fullSnapshots.map(s => s.views)) : 0;
  const likesVariation = fullSnapshots.length >= 2 ? calculateVariation(fullSnapshots.map(s => s.likes)) : 0;
  const commentsVariation = fullSnapshots.length >= 2 ? calculateVariation(fullSnapshots.map(s => s.commentCount || 0)) : 0;
  
  return `
  <div class="card p-4 mb-4 ${fireClass}">
    <div class="flex gap-4 items-start flex-wrap">
      <img src="${v.thumbnail}" class="w-32 h-20 object-cover rounded-lg border border-[#2a2a2a]" />
      <div class="flex-1 min-w-0">
        <p class="text-base font-semibold">${v.title} ${isRecent ? '🔥' : ''}</p>
        <p class="text-xs text-[var(--txt-dim)] font-mono">${v.artist} · ${fmtAge(v.publishedAt)}</p>
        <div class="mt-2 flex flex-wrap gap-1">
          <span class="badge ${v.category === 'grande' ? 'bg-red-900/40 text-red-300 border border-red-800' : v.category === 'petite' ? 'bg-blue-900/40 text-blue-300 border border-blue-800' : v.category === 'douteux' ? 'bg-amber-900/40 text-amber-300 border border-amber-800' : 'bg-gray-800 text-gray-400 border border-gray-700'}">${v.category === 'douteux' ? '⚠️ DOUTEUX' : v.category === 'hors-fenetre' ? 'NON CLASSÉ' : v.category}</span>
          ${v.frozen ? `<span class="badge bg-red-600 text-white"><i class="fa-solid fa-lock mr-1"></i>FIGÉ</span>` : ""}
          ${v.userValidated ? `<span class="badge bg-blue-600/30 text-blue-300 border border-blue-800"><i class="fa-solid fa-check mr-1"></i>VALIDÉ</span>` : ""}
          ${hasFocus ? `<span class="badge bg-amber-600/30 text-amber-300 border border-amber-800"><i class="fa-solid fa-bullseye mr-1"></i>FOCUS ${v.focusInterval || 30}min</span>` : ""}
        </div>
      </div>
      <div class="flex flex-col items-center shrink-0 relative">${scoreRing(v.score, 56)}<span class="absolute font-display text-sm" style="color:${scoreColor(v.score)}">${v.score}</span></div>
    </div>
    
    <div class="flex flex-wrap justify-center gap-4 mt-4 border-t border-[#2a2a2a] pt-4">
      <div class="text-center">
        <p class="text-xs text-[var(--txt-dim)]">Score</p>
        <p class="font-display text-lg" style="color:${scoreColor(v.score)}">${v.score}</p>
        <button class="text-[10px] text-[var(--txt-dim)] hover:text-white underline" onclick="addNotification('info', 'Score manuel à définir pour ${v.title}')">Modifier</button>
      </div>
      <div class="text-center">
        <p class="text-xs text-[var(--txt-dim)]">Tendance</p>
        <p class="font-semibold text-sm ${v.breakout ? 'text-green-400' : v.slowdown ? 'text-red-400' : 'text-[var(--txt-dim)]'}">
          ${v.breakout ? '📈 Montée' : v.slowdown ? '📉 Ralentit' : '➡️ Stable'}
        </p>
        <button class="text-[10px] text-[var(--txt-dim)] hover:text-white underline" onclick="addNotification('info', 'Tendance manuelle à définir pour ${v.title}')">Modifier</button>
      </div>
      <div class="text-center">
        <p class="text-xs text-[var(--txt-dim)]">Focus</p>
        <p class="font-semibold text-sm ${hasFocus ? 'text-amber-400' : 'text-[var(--txt-dim)]'}">
          ${hasFocus ? `🟡 ${v.focusInterval || 30}min` : '⚪ Off'}
        </p>
        <button class="text-[10px] text-[var(--txt-dim)] hover:text-white underline" onclick="openFocusSettings('${v.id}')">Configurer</button>
      </div>
    </div>
    
    <div class="flex flex-wrap justify-center gap-2 mt-4">
      <button onclick="openPlayer('${v.id}')" class="px-4 py-2 rounded-lg text-xs font-semibold transition bg-red-600 hover:bg-red-500 text-white"><i class="fa-solid fa-play mr-1"></i>Écouter</button>
      <button onclick="toggleFreeze('${v.id}')" class="px-4 py-2 rounded-lg text-xs font-semibold transition ${v.frozen ? 'bg-red-900/50 text-red-300 cursor-default' : 'bg-[#262626] text-[var(--txt-dim)] hover:text-white hover:bg-red-600'}">
        <i class="fa-solid ${v.frozen ? 'fa-lock' : 'fa-lock-open'} mr-1"></i>${v.frozen ? 'Figé' : 'Figer'}
      </button>
      <button onclick="deleteVideo('${v.id}')" class="px-4 py-2 rounded-lg text-xs font-semibold transition bg-red-900/30 text-red-300 hover:bg-red-600">Supprimer</button>
    </div>
  </div>

  <!-- Courbe principale avec variations -->
  <div class="card p-4 mb-4">
    <div class="flex justify-between items-center mb-2 flex-wrap gap-2">
      <p class="text-xs text-[var(--txt-dim)]">📈 Évolution Vues / Likes / Commentaires</p>
      <div class="flex gap-3 text-xs font-mono">
        <span>Vues <span class="${getVariationClass(viewsVariation)}">${formatVariation(viewsVariation)}</span></span>
        <span>Likes <span class="${getVariationClass(likesVariation)}">${formatVariation(likesVariation)}</span></span>
        <span>Commentaires <span class="${getVariationClass(commentsVariation)}">${formatVariation(commentsVariation)}</span></span>
      </div>
    </div>
    <canvas id="main-chart" height="120"></canvas>
  </div>

  <!-- Courbe de focus -->
  ${hasFocus && state.focusData ? `
  <div class="card p-4 mb-4 focus-curve">
    <p class="text-xs text-[var(--txt-dim)] mb-1">🎯 Focus — Rafraîchissement toutes les ${v.focusInterval || 30} min</p>
    <canvas id="focus-chart" height="100"></canvas>
  </div>` : ''}

  <!-- Commentaires -->
  <div class="card p-4">
    <p class="text-xs text-[var(--txt-dim)] mb-2"><i class="fa-solid fa-comments mr-1"></i>Commentaires</p>
    ${renderComments(v)}
  </div>`;
}

function renderComments(v) {
  if (v.comments == null) {
    return `<div class="flex items-center justify-center py-4 text-[var(--txt-dim)] text-xs"><i class="fa-solid fa-spinner animate-spin mr-2"></i>Chargement des commentaires...</div>`;
  }
  if (v.comments.error) {
    return `<p class="text-xs text-red-400">${v.comments.error}</p>`;
  }
  if (!v.comments.items || !v.comments.items.length) {
    return `<p class="text-xs text-[var(--txt-dim)]">Aucun commentaire disponible.</p>`;
  }
  return v.comments.items.slice(0, 5).map(c => `
    <div class="comment-item flex items-start gap-2 py-2 border-b border-[var(--line)] last:border-0">
      <img src="${c.authorImg || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(c.author) + '&background=FF0000&color=fff&size=32'}" class="w-7 h-7 rounded-full shrink-0" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(c.author)}&background=FF0000&color=fff&size=32'" />
      <div class="flex-1 min-w-0">
        <p class="text-xs font-semibold">${c.author}</p>
        <p class="text-xs text-[var(--txt-dim)] mt-0.5">${(c.text||"").slice(0,200)}${(c.text||"").length > 200 ? '…' : ''}</p>
        <p class="text-[10px] text-[var(--txt-dim)] mt-0.5">❤️ ${c.likeCount || 0}</p>
      </div>
    </div>
  `).join("");
}

function renderAnalyseCharts() {
  const v = state.selectedVideoId ? state.trackedVideos[state.selectedVideoId] : null;
  if (!v || !v.fullSnapshots || v.fullSnapshots.length < 2) return;
  
  const ctx = document.getElementById("main-chart");
  if (ctx) {
    if (mainChartInstance) { mainChartInstance.destroy(); mainChartInstance = null; }
    const pubTime = new Date(v.publishedAt).getTime();
    const labels = v.fullSnapshots.map(s => "J" + Math.max(1, Math.round((new Date(s.t).getTime() - pubTime) / 86400000) + 1));
    mainChartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'Vues', data: v.fullSnapshots.map(s => s.views), borderColor: COLORS.red, backgroundColor: 'rgba(255,0,0,0.08)', tension: 0.3, fill: true, yAxisID: 'y' },
          { label: 'Likes', data: v.fullSnapshots.map(s => s.likes), borderColor: COLORS.blue, backgroundColor: 'rgba(59,130,246,0.08)', tension: 0.3, fill: true, yAxisID: 'y1' },
          { label: 'Commentaires', data: v.fullSnapshots.map(s => s.commentCount || 0), borderColor: COLORS.amber, backgroundColor: 'rgba(255,176,32,0.08)', tension: 0.3, fill: true, yAxisID: 'y1' },
        ]
      },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        scales: {
          y: { position: 'left', ticks: { color: '#9A9A9A' }, grid: { color: '#222' } },
          y1: { position: 'right', ticks: { color: '#9A9A9A' }, grid: { display: false } },
          x: { ticks: { color: '#9A9A9A' }, grid: { display: false } }
        },
        plugins: { legend: { labels: { color: '#F2F2F2' } } }
      }
    });
  }
  
  if (state.focusData && state.focusData.length >= 2) {
    const ctxFocus = document.getElementById("focus-chart");
    if (ctxFocus) {
      if (focusChartInstance) { focusChartInstance.destroy(); focusChartInstance = null; }
      const pubTime = new Date(v.publishedAt).getTime();
      const labels = state.focusData.map(s => "J" + Math.max(1, Math.round((new Date(s.t).getTime() - pubTime) / 86400000) + 1));
      focusChartInstance = new Chart(ctxFocus, {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: 'Focus Vues', data: state.focusData.map(s => s.views), borderColor: COLORS.red, backgroundColor: 'rgba(255,0,0,0.1)', tension: 0.3, fill: true, borderWidth: 3, pointRadius: 4, pointBackgroundColor: COLORS.red },
            { label: 'Focus Likes', data: state.focusData.map(s => s.likes), borderColor: COLORS.blue, backgroundColor: 'rgba(59,130,246,0.1)', tension: 0.3, fill: true, borderWidth: 3, pointRadius: 4, pointBackgroundColor: COLORS.blue },
            { label: 'Focus Commentaires', data: state.focusData.map(s => s.commentCount || 0), borderColor: COLORS.amber, backgroundColor: 'rgba(255,176,32,0.1)', tension: 0.3, fill: true, borderWidth: 3, pointRadius: 4, pointBackgroundColor: COLORS.amber },
          ]
        },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          scales: {
            y: { position: 'left', ticks: { color: '#9A9A9A' }, grid: { color: '#222' } },
            x: { ticks: { color: '#9A9A9A' }, grid: { display: false } }
          },
          plugins: { legend: { labels: { color: '#F2F2F2' } } }
        }
      });
    }
  }
}

function renderCharts() {
  return `
  <div class="max-w-4xl">
    <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
      <p class="text-xs text-[var(--txt-dim)] font-mono">${state.chartsLastSync ? 'Dernière sync : ' + state.chartsLastSync.toLocaleTimeString('fr-FR') : "Pas synchronisé"}</p>
      <button onclick="syncCharts()" class="px-3 py-1.5 rounded-lg bg-[#1a1a1a] hover:bg-[#242424] text-xs font-semibold transition" ${state.loading ? 'disabled' : ''}>
        <i class="fa-solid fa-rotate ${state.loading ? 'animate-spin' : ''} mr-1"></i>Charger
      </button>
    </div>
    ${!state.charts.length ? `<div class="flex flex-col items-center justify-center py-16 text-[var(--txt-dim)]"><i class="fa-solid fa-ranking-star text-3xl mb-3 opacity-40"></i><p class="text-sm">Clique sur "Charger".</p></div>` : `
      <div class="flex flex-col gap-2">
        ${state.charts.slice(0, 15).map(c => `
          <div class="card card-clickable p-3 flex items-center gap-3" onclick="openAnalyse('${c.id}')">
            <span class="font-display text-lg w-6 text-center text-[var(--txt-dim)]">#${c.rank}</span>
            <img src="${c.thumbnail}" class="w-16 h-11 object-cover rounded-md border border-[#2a2a2a]" />
            <div class="flex-1 min-w-0"><p class="text-sm font-semibold truncate">${c.title}</p><p class="text-xs text-[var(--txt-dim)] font-mono">${c.channelTitle}</p></div>
            <button onclick="event.stopPropagation(); openPlayer('${c.id}')" class="px-2 py-1 rounded bg-red-600/30 text-red-300 hover:bg-red-600 text-xs"><i class="fa-solid fa-play"></i></button>
          </div>
        `).join("")}
      </div>
    `}
  </div>`;
}

// ========================================================================
// SCROLL INFINI
// ========================================================================
function setupInfiniteScroll() {
  const trigger = document.getElementById('scroll-trigger');
  if (!trigger) return;
  
  if (scrollObserver) {
    scrollObserver.disconnect();
    scrollObserver = null;
  }
  
  scrollObserver = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && !state.loadingMore && !state.loading) {
      state.loadingMore = true;
      state.visibleCount += 20;
      render();
      state.loadingMore = false;
    }
  }, { threshold: 0.1 });
  
  scrollObserver.observe(trigger);
}

// ========================================================================
// AUTHENTIFICATION
// ========================================================================
function renderLoginScreen() {
  return `<div class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full">
      <div class="flex items-center gap-2 mb-6 justify-center"><div class="w-10 h-10 rounded-lg bg-red-600 flex items-center justify-center"><i class="fa-brands fa-youtube text-white"></i></div><p class="font-display text-lg">RAP PULSE</p></div>
      <div class="card p-6 glow-red">
        <p class="text-sm font-semibold mb-1">Connexion</p>
        <p class="text-xs text-[var(--txt-dim)] mb-4">Accès réservé</p>
        <input id="login-email" type="email" placeholder="email@exemple.com" class="w-full px-3 py-2.5 rounded-lg text-sm mb-2" />
        <input id="login-password" type="password" placeholder="Mot de passe" class="w-full px-3 py-2.5 rounded-lg text-sm mb-3" />
        <button id="login-submit" class="w-full py-2.5 rounded-lg bg-red-600 hover:bg-red-500 text-white text-sm font-semibold transition">Se connecter</button>
        <p id="login-error" class="text-xs text-red-400 mt-2 hidden"></p>
      </div>
    </div>
  </div>`;
}

function bindLoginScreen() {
  const submit = document.getElementById("login-submit");
  const doLogin = async () => {
    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    const errEl = document.getElementById("login-error");
    errEl.classList.add("hidden");
    try {
      await auth.signInWithEmailAndPassword(email, password);
    } catch(e) {
      errEl.textContent = "Connexion refusée : " + e.message;
      errEl.classList.remove("hidden");
    }
  };
  submit.onclick = doLogin;
  document.getElementById("login-password").addEventListener("keydown", e => { if(e.key === 'Enter') doLogin(); });
}

async function doSignOut() {
  if (unsubscribeVideos) unsubscribeVideos();
  if (unsubscribeArtists) unsubscribeArtists();
  state.trackedVideos = {};
  state.selectedVideoId = null;
  state.currentVideoId = null;
  state.selectedArtist = null;
  if (syncInterval) { clearInterval(syncInterval); syncInterval = null; }
  await auth.signOut();
}

// ========================================================================
// UI ACTIONS
// ========================================================================
function setTab(id) {
  state.activeTab = id;
  state.sidebarOpen = false;
  if (id === 'podium') {
    state.visibleCount = 20;
  }
  if (id !== 'artistes') {
    state.selectedArtist = null;
  }
  render();
}

function toggleNotifPanel() {
  state.notifPanelOpen = !state.notifPanelOpen;
  render();
}

async function runManualSearch() {
  const title = document.getElementById("search-title")?.value.trim();
  const artist = document.getElementById("search-artist")?.value.trim();
  state.searchError = null;
  if (!title && !artist) {
    state.searchError = "Indique au moins un titre ou un artiste.";
    render();
    return;
  }
  state.loading = true;
  state.isLoadingShown = true;
  state.loadingMsg = "Recherche YouTube...";
  render();
  try {
    const data = await ytFetch("search", {
      part: "snippet",
      q: `${title} ${artist}`,
      type: "video",
      maxResults: "5",
      order: "relevance"
    });
    if (!data.items || !data.items.length) throw new Error("Aucune vidéo trouvée.");
    const top = data.items[0];
    const details = await getVideosDetails([top.id.videoId]);
    if (!details.length) throw new Error("Impossible de récupérer les stats.");
    const v = details[0];
    const video = {
      id: v.id,
      title: v.snippet.title,
      channelId: v.snippet.channelId,
      channelTitle: v.snippet.channelTitle,
      thumbnail: v.snippet.thumbnails?.medium?.url || v.snippet.thumbnails?.default?.url,
      publishedAt: v.snippet.publishedAt,
      views: parseInt(v.statistics.viewCount || 0),
      likes: parseInt(v.statistics.likeCount || 0),
      commentCount: parseInt(v.statistics.commentCount || 0),
      duration: parseISODuration(v.contentDetails.duration)
    };
    await fsUpsertVideo(video, artist || v.snippet.channelTitle);
    await openAnalyse(video.id);
  } catch(e) {
    state.searchError = e.message;
  }
  state.loading = false;
  state.isLoadingShown = false;
  state.loadingMsg = "";
  render();
}

async function toggleFreeze(videoId) {
  const v = state.trackedVideos[videoId];
  if (!v) return;
  if (v.frozen) {
    await fsSetFrozen(videoId, false, null);
  } else {
    const date = new Date().toISOString();
    await fsSetFrozen(videoId, true, date);
  }
}

// ========================================================================
// BOOT
// ========================================================================
state.authLoading = true;
auth.onAuthStateChanged(user => {
  state.authLoading = false;
  state.user = user;
  if (user) {
    fsListenArtists();
    fsListenVideos();
    scheduleDailySync();
    setTimeout(() => {
      if (state.artists.length > 0 && state.isInitialSync) {
        syncAll();
      }
    }, 10000);
  } else {
    if (unsubscribeVideos) unsubscribeVideos();
    if (unsubscribeArtists) unsubscribeArtists();
    unsubscribeVideos = null;
    unsubscribeArtists = null;
    state.trackedVideos = {};
    state.artists = [];
    state.currentVideoId = null;
    state.selectedArtist = null;
    if (syncInterval) { clearInterval(syncInterval); syncInterval = null; }
  }
  render();
});
render();
</script>
